name: 从 Wiki 更新主页

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install axios
      - run: node scripts/updateFromWiki.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: 从 Wiki 更新主页'
          branch: main